# ACT hyperparameters
model:
  image_feature_dim: 512      # ResNet-18 output per camera
  ft_feature_dim: 128         # 1D-CNN output
  proprio_feature_dim: 64     # Linear projection output
  transformer_dim: 256
  transformer_heads: 4
  transformer_layers: 4
  latent_dim: 64              # CVAE latent (64 for 32-step x 20D action chunk)
  action_dim: 20              # 3+4+6+6+1
  action_chunk: 32            # Tp

data:
  control_hz: 20              # dataset collected at 20Hz
  obs_window_image: 4         # To for RGB (4 steps = 200ms at 20Hz)
  obs_window_proprio: 16      # To for F/T + proprio (16 steps = 800ms at 20Hz)
  train_val_split: 0.9        # episode-level
  image_size: [256, 288]      # H x W after scale (IMAGE_SCALE=0.25)

training:
  batch_size: 32              # AMP enabled — safe on 4070S 12GB
  lr: 1e-4
  weight_decay: 1e-4
  epochs: 200
  early_stopping_patience: 20
  num_workers: 12             # 5950X 16-core; leave 4 for OS + main process
  checkpoint_every_n: 1       # save every epoch
  s3_sync_every_n: 5          # sync to S3 every N epochs
  s3_bucket: "s3://aic-yusuf/checkpoints"
  checkpoint_dir: "~/checkpoints"
