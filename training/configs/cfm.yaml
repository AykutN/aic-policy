# CFM hyperparameters (inherits same encoder config as act.yaml)
model:
  image_feature_dim: 512
  ft_feature_dim: 128
  proprio_feature_dim: 64
  fusion_dim: 256
  flow_hidden_dim: 512
  flow_layers: 6
  action_dim: 20
  action_chunk: 32

data:
  control_hz: 20
  obs_window_image: 4
  obs_window_proprio: 16
  train_val_split: 0.9
  image_size: [128, 144]

training:
  batch_size: 128
  lr: 0.0001
  weight_decay: 0.0001
  epochs: 200
  early_stopping_patience: 20
  num_workers: 12
  prefetch_factor: 2
  keep_last_n_checkpoints: 3
  rclone_sync_every_n: 5
  rclone_remote: "gdrive:checkpoints"
  checkpoint_dir: "/workspace/checkpoints"
  seed: 42

inference:
  n_flow_steps: 10
